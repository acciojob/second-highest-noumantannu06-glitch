<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>
	 <h1>Find the Second Highest Element</h1>
    <input type="text" id="arrayInput" placeholder="Enter array elements separated by commas" />
    <button onclick="findSecondHighest()">Find Second Highest</button>
    <div id="result"></div>

<body>	
	<script>
		function secondHighest(arr) {
			//Write your code here
			      if (arr.length < 2) {
                return -Infinity;
            }

            // Use a Set to remove duplicates
            const uniqueElements = Array.from(new Set(arr));

            // Check if we have enough unique elements
            if (uniqueElements.length < 2) {
                return -Infinity;
            }

            // Sort the unique elements in descending order
            uniqueElements.sort((a, b) => b - a);

            // Return the second highest element
            return uniqueElements[1];
        }

        function findSecondHighest() {
            const input = document.getElementById('arrayInput').value;
            const arr = input.split(',').map(Number); // Convert input to an array of numbers
            const result = secondHighest(arr);
            document.getElementById('result').innerText = 'Second Highest Element: ' + result;
        }
			
		}

		function Main() {
			var n = prompt("Enter the number of elements");
			var arr = [];
			for (var i = 0; i < n; i++) {
				arr[i] = prompt("Enter element " + (i+1));
			}
			alert(secondHighest(arr));
		}
		Main();
	</script>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
